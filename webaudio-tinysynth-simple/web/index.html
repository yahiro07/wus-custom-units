<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://unpkg.com/@webcomponents/custom-elements"></script>
    <script src="https://g200kg.github.io/webaudio-controls/webaudio-controls.js"></script>
    <script src="./webaudio-tinysynth.js"></script>
    <script>
      async function Init() {
        synth = document.getElementById("tinysynth");
        kb = document.getElementById("keyboard");
        kb.addEventListener("change", KeyIn);

        await synth.ready();

        for (var i = 0; i < 128; ++i) {
          var o = document.createElement("option");
          o.innerHTML = i + 1 + " : " + synth.getTimbreName(0, i);
          document.getElementById("prog").appendChild(o);
        }

        const uintInterface = window.unitInterface;
        if (uintInterface) {
          unitInterface.completeSetup({
            unitAspects: {
              unitType: "instrument",
              categoryHint: "synthesizer",
              outputs: ["audio"],
              inputs: ["note"],
            },
            noteInput: {
              noteOn(noteNumber, time, velocity) {
                synth.send([0x90, noteNumber, (velocity ?? 1) * 127], time);
              },
              noteOff(noteNumber, time) {
                synth.send([0x80, noteNumber, 0], time);
              },
            },
            persistence: {
              emitStateBytes() {
                const pg = document.getElementById("prog").selectedIndex;
                return new Uint8Array([pg]);
              },
              applyStateBytes(stateBytes) {
                const pg = stateBytes[0];
                document.getElementById("prog").selectedIndex = pg;
                Prog(pg);
              },
            },
          });
        }
      }
      function Prog(pg) {
        synth.send([0xc0, pg]);
      }
      function KeyIn(e) {
        synth.send([0x90, e.note[1], e.note[0] ? 100 : 0]);
      }
      window.onload = function () {
        Init();
      };
    </script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body style="padding: 10px 20px">
    <div
      style="display: flex; justify-content: space-between; align-items: center"
    >
      <h1>TinySynth</h1>
    </div>
    <div style="display: flex; flex-direction: column; gap: 4px">
      <div>
        Prog :
        <select id="prog" onchange="Prog(this.selectedIndex)"></select>
      </div>
      <webaudio-keyboard id="keyboard" min="48"></webaudio-keyboard>
      <webaudio-tinysynth id="tinysynth"></webaudio-tinysynth>
    </div>
  </body>
</html>
